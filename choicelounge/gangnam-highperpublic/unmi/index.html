<!DOCTYPE html>
<html lang="ko-KR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="page-title">강남 하이퍼블릭 | CHOICE LOUNGE</title>
<meta name="description" id="page-desc" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a96e;--gold-light:#e8d5b0;--gold-dark:#a07d4a;
  --black:#0b0b0b;--black2:#111;--black3:#181818;--black4:#222;
  --text:#f5f0e8;--text-dim:#8a8272;--text-muted:#5a5549;
  --glass-border:rgba(255,255,255,0.08);--t:all .4s cubic-bezier(.25,.46,.45,.94);
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);overflow-x:hidden}
a{text-decoration:none;color:inherit;transition:var(--t)}
img{max-width:100%;display:block}
.container{max-width:1200px;margin:0 auto;padding:0 32px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}
.reveal{opacity:0;transform:translateY(32px);transition:opacity .7s,transform .7s}.reveal.v{opacity:1;transform:none}
/* Header */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:20px 0;transition:var(--t)}
.header.scrolled{padding:12px 0;background:rgba(11,11,11,.95);backdrop-filter:blur(30px);border-bottom:1px solid var(--glass-border)}
.header .container{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--gold);letter-spacing:3px}
.nav{display:flex;align-items:center;gap:32px}
.nav a{font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
.nav a:hover,.nav a.active{color:var(--gold)}
.nav__cta{padding:12px 28px;border:1.5px solid var(--gold);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold)!important;position:relative;overflow:hidden}
.nav__cta::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateY(100%);transition:transform .4s;z-index:-1}
.nav__cta:hover::before{transform:translateY(0)}.nav__cta:hover{color:var(--black)!important}
.mobile-toggle{display:none;background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;letter-spacing:3px}
.mobile-nav{display:none;position:fixed;inset:0;background:rgba(11,11,11,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.mobile-nav.open{display:flex}
.mobile-nav a{font-size:17px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dim)}.mobile-nav a:hover{color:var(--gold)}
.mobile-nav__close{position:absolute;top:24px;right:24px;background:none;border:none;color:var(--gold);font-size:26px;cursor:pointer}
/* Eyebrow */
.eyebrow{font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:block}
/* Hero */
.dhero{position:relative;min-height:85vh;display:flex;align-items:flex-end;overflow:hidden;padding-bottom:80px}
.dhero__bg{position:absolute;inset:0}.dhero__bg img{width:100%;height:100%;object-fit:cover;animation:sz 22s ease infinite alternate}
.dhero__ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(11,11,11,1) 0%,rgba(11,11,11,.55) 55%,rgba(11,11,11,.15) 100%)}
@keyframes sz{0%{transform:scale(1)}100%{transform:scale(1.1)}}
.dhero__content{position:relative;z-index:2;max-width:800px}
.dhero__breadcrumb{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);margin-bottom:20px}
.dhero__breadcrumb a{color:var(--gold-dark)}.dhero__breadcrumb a:hover{color:var(--gold)}
.dhero__badge{display:inline-flex;align-items:center;gap:8px;padding:7px 20px;border:1px solid var(--gold-dark);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.dhero__badge-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.dhero__title{font-family:'Playfair Display',serif;font-size:clamp(52px,10vw,96px);font-weight:900;line-height:.9;margin-bottom:20px}
.dhero__title em{font-style:italic;color:var(--gold)}
.dhero__desc{font-size:15px;color:var(--text-dim);line-height:1.8;max-width:520px;font-weight:300;margin-bottom:28px}
.dhero__meta{display:flex;gap:12px;flex-wrap:wrap}
.dhero__meta-tag{padding:7px 18px;border:1px solid var(--glass-border);font-size:12px;color:var(--text-muted);letter-spacing:1px}
/* Contact bar */
.contact-bar{background:var(--black2);border-top:1px solid var(--glass-border);border-bottom:1px solid var(--glass-border);padding:22px 0}
.contact-bar__inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.contact-bar__info{display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.contact-bar__label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px}
.contact-bar__value{font-size:15px;font-weight:700;color:var(--text)}
.contact-bar__value.gold{color:var(--gold)}
.contact-bar__btns{display:flex;gap:10px}
.btn-call{padding:13px 28px;background:var(--gold);color:var(--black);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:var(--t);white-space:nowrap;display:inline-block}
.btn-call:hover{background:var(--gold-light);transform:translateY(-2px);color:var(--black)}
.btn-call-out{padding:13px 28px;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:var(--t);white-space:nowrap;display:inline-block}
.btn-call-out:hover{background:var(--gold);color:var(--black)}
/* Pricing */
.pricing-sec{padding:100px 0}
.pricing-sec__title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,44px);font-weight:900;margin-bottom:12px}
.pricing-sec__desc{font-size:15px;color:var(--text-dim);line-height:1.8;font-weight:300;margin-bottom:40px}
.ptabs{display:flex;margin-bottom:28px;border:1px solid var(--glass-border);width:fit-content}
.ptab{padding:12px 36px;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:var(--t)}
.ptab.active{background:var(--gold);color:var(--black)}
.ptab-content{display:none}.ptab-content.show{display:block}
.ptable-wrap{overflow-x:auto}
.ptable{width:100%;border-collapse:collapse;min-width:560px}
.ptable th{background:var(--black3);color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:15px 18px;border:1px solid var(--glass-border);text-align:center;font-weight:700}
.ptable th.lh{text-align:left}
.ptable td{padding:13px 18px;border:1px solid var(--glass-border);font-size:14px;color:var(--text-dim);text-align:center}
.ptable td.rh{text-align:left;font-weight:700;color:var(--text);background:var(--black2);white-space:nowrap}
.ptable tr:hover td{background:rgba(201,169,110,.02)}
.ptable .total td{background:var(--black3)}
.ptable .total .rh{color:var(--gold)}
.ptable .total td:not(.rh){color:var(--gold);font-weight:700;font-size:15px}
.price-notice{margin-top:18px;padding:16px 20px;border:1px solid var(--glass-border);background:var(--black2);font-size:13px;color:var(--text-muted);line-height:1.8}
/* Features */
.features-sec{padding:80px 0;border-top:1px solid var(--glass-border)}
.features-sec__title{font-family:'Playfair Display',serif;font-size:clamp(24px,3vw,36px);font-weight:900;margin-bottom:8px}
.features-sec__desc{font-size:15px;color:var(--text-dim);font-weight:300;margin-bottom:36px}
.features-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.feat-item{padding:28px;border:1px solid var(--glass-border);display:flex;gap:16px;align-items:flex-start;transition:var(--t)}
.feat-item:hover{border-color:var(--gold);background:rgba(201,169,110,.02)}
.feat-item__icon{font-size:24px;flex-shrink:0;margin-top:2px}
.feat-item__text{font-size:14px;color:var(--text-dim);line-height:1.7}
/* CTA Contact */
.cta-sec{padding:80px 0;background:var(--black2);border-top:1px solid var(--glass-border)}
.cta-sec__inner{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.cta-sec__title{font-family:'Playfair Display',serif;font-size:clamp(26px,3.5vw,40px);font-weight:900;margin-bottom:14px}
.cta-sec__desc{font-size:15px;color:var(--text-dim);line-height:1.9;font-weight:300;margin-bottom:28px}
.cta-sec__phone{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,34px);font-weight:900;color:var(--gold);margin-bottom:20px;letter-spacing:2px}
.cta-sec__btns{display:flex;gap:12px;flex-wrap:wrap}
/* Others */
.others-sec{padding:80px 0;border-top:1px solid var(--glass-border)}
.others-sec__title{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,34px);font-weight:900;margin-bottom:32px}
.others-grid{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}.others-grid::-webkit-scrollbar{display:none}
.ocard{flex:0 0 165px;border:1px solid var(--glass-border);transition:var(--t);display:block}
.ocard:hover{border-color:var(--gold);transform:translateY(-4px)}
.ocard__img{aspect-ratio:3/4;overflow:hidden}
.ocard__img img{width:100%;height:100%;object-fit:cover;filter:grayscale(40%);transition:all .5s}
.ocard:hover .ocard__img img{filter:grayscale(0%);transform:scale(1.05)}
.ocard__body{padding:13px}
.ocard__name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:4px}
.ocard__desc{font-size:11px;color:var(--text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Footer */
.footer{border-top:1px solid var(--glass-border);padding:60px 0}
.footer__inner{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:40px}
.footer__logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--gold);letter-spacing:3px;margin-bottom:14px}
.footer__notice{font-size:12px;color:var(--text-muted);max-width:400px;line-height:1.8}
.footer__links{display:flex;gap:24px;flex-wrap:wrap}
.footer__links a{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}.footer__links a:hover{color:var(--gold)}
.footer__bottom{margin-top:40px;padding-top:20px;border-top:1px solid var(--glass-border);text-align:center;font-size:11px;color:var(--text-muted);letter-spacing:2px}
/* BTT */
.btt{position:fixed;bottom:32px;right:32px;width:48px;height:48px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;opacity:0;visibility:hidden;transition:var(--t);display:flex;align-items:center;justify-content:center;z-index:999;font-size:18px}
.btt.visible{opacity:1;visibility:visible}.btt:hover{background:var(--gold);color:var(--black)}
/* Responsive */
@media(max-width:1024px){.cta-sec__inner{grid-template-columns:1fr}}
@media(max-width:768px){
  .nav{display:none}.mobile-toggle{display:block}
  .header{padding:14px 0}.logo{font-size:20px}.container{padding:0 16px}
  .dhero{min-height:70vh;padding-bottom:56px}
  .dhero__title{font-size:clamp(40px,12vw,64px)}
  .contact-bar__inner{flex-direction:column;align-items:flex-start}
  .contact-bar__btns{width:100%}.btn-call,.btn-call-out{flex:1;text-align:center}
  .pricing-sec{padding:60px 0}.features-sec,.cta-sec,.others-sec{padding:60px 0}
  .ptab{padding:10px 18px;font-size:11px}
  .features-grid{grid-template-columns:1fr}
}
@media(max-width:480px){.dhero__title{font-size:clamp(36px,12vw,52px)}}</style>
</head>

<!-- 이 페이지의 slug -->
<script>var VENUE_SLUG = 'unmi';</script>

<script>
/* ── 유틸 ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(n){return Number(n).toLocaleString('ko-KR')}

/* ── IntersectionObserver ── */
var obs = new IntersectionObserver(function(es){
  es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('v')});
},{threshold:.1});
function observe(root){
  (root||document).querySelectorAll('.reveal').forEach(function(el){obs.observe(el)});
}
observe();

/* ── 헤더/BTT ── */
var hdr=document.getElementById('header'),btt=document.getElementById('btt');
window.addEventListener('scroll',function(){
  hdr.classList.toggle('scrolled',scrollY>60);
  btt.classList.toggle('visible',scrollY>400);
});

/* ── 모바일 메뉴 ── */
document.getElementById('mobileOpen').onclick=function(){document.getElementById('mobileNav').classList.add('open')};
document.getElementById('mobileClose').onclick=function(){document.getElementById('mobileNav').classList.remove('open')};
document.querySelectorAll('#mobileNav a').forEach(function(a){
  a.addEventListener('click',function(){document.getElementById('mobileNav').classList.remove('open')});
});

/* ── 가격표 렌더 ── */
function renderPriceTable(part){
  var persons = [1,2,3,4];
  var totals  = part.base.map(function(b){return b + part.drink + part.tc + part.rt});
  var th = '<tr><th class="lh">구분</th>' + persons.map(function(p){return '<th>'+p+'인</th>'}).join('') + '</tr>';
  function row(label, vals){
    return '<tr><td class="rh">'+label+'</td>' + vals.map(function(v){return '<td>'+fmt(v)+'원</td>'}).join('') + '</tr>';
  }
  var drinkArr = persons.map(function(){return part.drink});
  var tcArr    = persons.map(function(){return part.tc});
  var rtArr    = persons.map(function(){return part.rt});
  var tbody = row('기본금 (초이스)', part.base)
            + row('주대',           drinkArr)
            + row('TC (타임차지)',  tcArr)
            + row('RT (웨이터팁)', rtArr)
            + '<tr class="total"><td class="rh">합계</td>'
            + totals.map(function(t){return '<td>'+fmt(t)+'원</td>'}).join('')
            + '</tr>';
  return '<div class="ptable-wrap"><table class="ptable"><thead>'+th+'</thead><tbody>'+tbody+'</tbody></table></div>';
}

/* ── 이미지 맵 (slug → Unsplash URL) ── */
var OTHER_IMGS = {
  unmi:     'https://images.unsplash.com/photo-1543007630-9710e4a00a20?w=400&q=80',
  dessert:  'https://images.unsplash.com/photo-1571204829887-3b8d69e4094d?w=400&q=80',
  dalto:    'https://images.unsplash.com/photo-1545128485-c400e7702712?w=400&q=80',
  elite:    'https://images.unsplash.com/photo-1578474846511-04ba529f0b88?w=400&q=80',
  dopamine: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=400&q=80',
  zeus:     'https://images.unsplash.com/photo-1574391884720-bbc3740c59d1?w=400&q=80',
  sumokwon: 'https://images.unsplash.com/photo-1519214605650-76a613ee3245?w=400&q=80',
  worklife: 'https://images.unsplash.com/photo-1560624052-449f5ddf0c31?w=400&q=80'
};

/* ── venues.json + texts.json 동시 로드 후 렌더 ── */
Promise.all([
  fetch('../../venues.json').then(function(r){return r.json()}),
  fetch('../../texts.json').then(function(r){return r.json()})
]).then(function(results){
  var venues = results[0];
  var texts  = results[1];
  var v = venues[VENUE_SLUG];
  if(!v){console.error('Venue not found:', VENUE_SLUG); return;}

  /* meta / title */
  document.title = v.meta.title;
  document.getElementById('page-title').textContent = v.meta.title;
  document.getElementById('page-desc').setAttribute('content', v.meta.desc);

  /* nav CTA */
  var phoneLink = v.phoneLink;
  document.getElementById('nav-cta').href  = phoneLink;
  document.getElementById('mobile-cta').href = phoneLink;

  /* hero */
  document.getElementById('bc-name').textContent  = v.name;
  document.getElementById('hero-name').textContent = v.name;
  document.getElementById('hero-desc').textContent = v.desc;
  document.getElementById('hero-badge').textContent = v.status + ' · Hyper Public';
  document.getElementById('hero-meta').innerHTML =
    '<span class="dhero__meta-tag">1부 '+esc(v.part1.time)+'</span>' +
    '<span class="dhero__meta-tag">2부 '+esc(v.part2.time)+'</span>' +
    '<span class="dhero__meta-tag">룸 '+esc(v.rooms)+'개</span>';

  /* contact bar */
  document.getElementById('contact-info').innerHTML =
    '<div><div class="contact-bar__label">예약문의</div><div class="contact-bar__value gold">'+esc(v.phone)+'</div></div>' +
    '<div><div class="contact-bar__label">1부 운영</div><div class="contact-bar__value">'+esc(v.part1.time)+'</div></div>' +
    '<div><div class="contact-bar__label">2부 운영</div><div class="contact-bar__value">'+esc(v.part2.time)+'</div></div>';
  document.getElementById('contact-btns').innerHTML =
    '<a href="'+phoneLink+'" class="btn-call">'+esc(texts.common.phoneInquiry)+'</a>' +
    '<a href="'+phoneLink+'" class="btn-call-out">'+esc(v.phone)+'</a>';

  /* pricing */
  document.getElementById('price-title').textContent = v.name + ' 가격 안내';
  document.getElementById('price-desc').textContent  = '아래 금액은 평균 기준이며 실제 가격은 상황에 따라 달라질 수 있습니다. 정확한 금액은 예약 문의를 통해 확인해 주세요.';
  document.getElementById('price-notice').innerHTML  = '<strong>※ 안내</strong> · ' + esc(v.notice);

  var tabsHtml = '', contentsHtml = '';
  var parts = [v.part1, v.part2];
  parts.forEach(function(part, idx){
    var id  = 'ptab-' + idx;
    var active = idx===0 ? 'active' : '';
    var showCls = idx===0 ? 'show' : '';
    tabsHtml     += '<div class="ptab '+active+'" data-id="'+id+'">'+esc(part.label)+' · '+esc(part.time)+'</div>';
    contentsHtml += '<div class="ptab-content '+showCls+'" id="'+id+'">'+renderPriceTable(part)+'</div>';
  });
  document.getElementById('ptabs').innerHTML = tabsHtml;
  document.getElementById('ptab-contents').innerHTML = contentsHtml;

  /* tab click */
  document.querySelectorAll('.ptab').forEach(function(tab){
    tab.addEventListener('click',function(){
      document.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('active')});
      document.querySelectorAll('.ptab-content').forEach(function(c){c.classList.remove('show')});
      tab.classList.add('active');
      document.getElementById(tab.dataset.id).classList.add('show');
    });
  });

  /* features */
  document.getElementById('feat-title').textContent = v.name + ' 특징';
  document.getElementById('feat-desc').textContent  = v.desc;
  document.getElementById('features-grid').innerHTML = v.features.map(function(f){
    return '<div class="feat-item reveal"><div class="feat-item__icon">'+esc(f.icon)+'</div><div class="feat-item__text">'+esc(f.text)+'</div></div>';
  }).join('');

  /* CTA */
  document.getElementById('cta-title').textContent = texts.venues.highperpublic.ctaTitle;
  document.getElementById('cta-desc').textContent  = v.desc;
  document.getElementById('cta-phone').textContent = v.phone;
  document.getElementById('cta-btns').innerHTML =
    '<a href="'+phoneLink+'" class="btn-call">'+esc(texts.common.phoneInquiry)+'</a>' +
    '<a href="../../highperpublic/index.html" class="btn-call-out">목록으로</a>';

  /* others */
  var othersHtml = '';
  Object.keys(venues).forEach(function(sl){
    if(sl === VENUE_SLUG) return;
    var ov = venues[sl];
    var oImg = OTHER_IMGS[sl] || OTHER_IMGS.unmi;
    othersHtml += '<a href="../'+sl+'/" class="ocard">' +
      '<div class="ocard__img"><img src="'+oImg+'" alt="'+esc(ov.name)+'" loading="lazy"></div>' +
      '<div class="ocard__body"><div class="ocard__name">'+esc(ov.name)+'</div><div class="ocard__desc">'+esc(ov.desc)+'</div></div>' +
      '</a>';
  });
  document.getElementById('others-grid').innerHTML = othersHtml;

  /* footer */
  document.getElementById('footer-notice').textContent = texts.footer.notice;
  document.getElementById('footer-copy').textContent   = texts.footer.copyright;

  /* observe 동적 요소 */
  observe(document.getElementById('features-grid'));
  observe(document.getElementById('others-grid'));

}).catch(function(err){
  console.error('JSON 로드 실패:', err);
});
</script>
</body>
</html>
