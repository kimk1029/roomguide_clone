<!DOCTYPE html>
<html lang="ko-KR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="page-title">강남 하이퍼블릭 | CHOICE LOUNGE</title>
<meta name="description" id="page-desc" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a96e;--gold-light:#e8d5b0;--gold-dark:#a07d4a;
  --black:#0b0b0b;--black2:#111;--black3:#181818;--black4:#222;
  --text:#f5f0e8;--text-dim:#8a8272;--text-muted:#5a5549;
  --glass-border:rgba(255,255,255,0.08);--t:all .4s cubic-bezier(.25,.46,.45,.94);
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--black);color:var(--text);overflow-x:hidden}
a{text-decoration:none;color:inherit;transition:var(--t)}
img{max-width:100%;display:block}
.container{max-width:1200px;margin:0 auto;padding:0 32px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}
.reveal{opacity:0;transform:translateY(32px);transition:opacity .7s,transform .7s}.reveal.v{opacity:1;transform:none}
body:not(.lang-en) .en-t{display:none!important}
body.lang-en .ko-t{display:none!important}
.lang-btn{background:none;border:1px solid var(--gold-dark);color:var(--text-muted);font-size:10px;letter-spacing:2px;padding:5px 10px;cursor:pointer;transition:var(--t);font-family:'Noto Sans KR',sans-serif}
.lang-btn:hover{border-color:var(--gold);color:var(--gold)}
/* Header */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:20px 0;transition:var(--t)}
.header.scrolled{padding:12px 0;background:rgba(11,11,11,.96);backdrop-filter:blur(30px);border-bottom:1px solid var(--glass-border)}
.header .container{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--gold);letter-spacing:3px}
.nav{display:flex;align-items:center;gap:28px}
.nav a{font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
.nav a:hover,.nav a.active{color:var(--gold)}
.nav__cta{padding:11px 26px;border:1.5px solid var(--gold);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold)!important;position:relative;overflow:hidden}
.nav__cta::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateY(100%);transition:transform .4s;z-index:-1}
.nav__cta:hover::before{transform:translateY(0)}.nav__cta:hover{color:var(--black)!important}
.mobile-toggle{display:none;background:none;border:none;color:var(--gold);font-size:20px;cursor:pointer;letter-spacing:3px}
.mobile-nav{display:none;position:fixed;inset:0;background:rgba(11,11,11,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.mobile-nav.open{display:flex}
.mobile-nav a{font-size:17px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dim)}.mobile-nav a:hover{color:var(--gold)}
.mobile-nav__close{position:absolute;top:24px;right:24px;background:none;border:none;color:var(--gold);font-size:26px;cursor:pointer}
.eyebrow{font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:block}
/* Hero */
.dhero{position:relative;min-height:90vh;display:flex;align-items:center;overflow:hidden}
.dhero__bg{position:absolute;inset:0;overflow:hidden}
.dhero__bg img{width:100%;height:130%;object-fit:cover;will-change:transform;transform:translateY(0);filter:brightness(.75)}
.dhero__ov{position:absolute;inset:0;background:linear-gradient(135deg,rgba(11,11,11,.72) 0%,rgba(11,11,11,.42) 50%,rgba(11,11,11,.68) 100%)}
.dhero__content{position:relative;z-index:2;max-width:800px}
.dhero__breadcrumb{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);margin-bottom:20px}
.dhero__breadcrumb a{color:var(--gold-dark)}.dhero__breadcrumb a:hover{color:var(--gold)}
.dhero__badge{display:inline-flex;align-items:center;gap:8px;padding:7px 20px;border:1px solid var(--gold-dark);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.dhero__badge-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.dhero__title{font-family:'Playfair Display',serif;font-size:clamp(48px,9vw,96px);font-weight:900;line-height:.9;margin-bottom:20px}
.dhero__title em{font-style:italic;color:var(--gold)}
.dhero__desc{font-size:15px;color:var(--text-dim);line-height:1.8;max-width:520px;font-weight:300;margin-bottom:28px}
.dhero__meta{display:flex;gap:12px;flex-wrap:wrap}
.dhero__meta-tag{padding:7px 18px;border:1px solid var(--glass-border);font-size:12px;color:var(--text-muted);letter-spacing:1px}
/* Contact bar */
.contact-bar{background:var(--black2);border-top:1px solid var(--glass-border);border-bottom:1px solid var(--glass-border);padding:22px 0}
.contact-bar__inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.contact-bar__info{display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.contact-bar__label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px}
.contact-bar__value{font-size:15px;font-weight:700;color:var(--text)}
.contact-bar__value.gold{color:var(--gold)}
.contact-bar__btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-call{padding:13px 28px;background:var(--gold);color:var(--black);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:var(--t);white-space:nowrap;display:inline-block}
.btn-call:hover{background:var(--gold-light);transform:translateY(-2px);color:var(--black)}
.btn-call-out{padding:13px 28px;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:var(--t);white-space:nowrap;display:inline-block}
.btn-call-out:hover{background:var(--gold);color:var(--black)}
/* Social bar */
.social-bar{background:var(--black3);border-bottom:1px solid var(--glass-border);padding:16px 0}
.social-bar__inner{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.soc-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border:1px solid var(--glass-border);font-size:12px;letter-spacing:.5px;color:var(--text-dim);transition:var(--t);white-space:nowrap;background:transparent}
.soc-btn svg{width:15px;height:15px;flex-shrink:0}
.soc-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.soc-btn--phone{border-color:var(--gold-dark);color:var(--gold)}
.soc-btn--phone:hover{background:var(--gold);color:var(--black)}
/* Summary bullets */
.summary-sec{padding:60px 0;border-bottom:1px solid var(--glass-border)}
.summary-sec__title{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,32px);font-weight:900;margin-bottom:20px}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.summary-item{padding:18px 22px;border:1px solid var(--glass-border);font-size:14px;color:var(--text-dim);line-height:1.7;display:flex;align-items:flex-start;gap:10px;transition:var(--t)}
.summary-item:hover{border-color:var(--gold-dark)}
.summary-item::before{content:'✦';color:var(--gold);font-size:10px;margin-top:5px;flex-shrink:0}
/* Content sections */
.content-sec{padding:80px 0;border-bottom:1px solid var(--glass-border)}
.content-sec__title{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,36px);font-weight:900;margin-bottom:24px;color:var(--text)}
.content-sec__body p{font-size:15px;color:var(--text-dim);line-height:1.95;font-weight:300;margin-bottom:18px;max-width:760px}
.content-sec__body p:last-child{margin-bottom:0}
/* Gallery */
.gallery-sec{padding:80px 0;background:var(--black2);border-top:1px solid var(--glass-border);border-bottom:1px solid var(--glass-border)}
.gallery-sec__title{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,36px);font-weight:900;margin-bottom:8px}
.gallery-sec__desc{font-size:14px;color:var(--text-muted);margin-bottom:32px}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gallery-item{position:relative;overflow:hidden;aspect-ratio:4/3;cursor:pointer;background:var(--black3)}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s;filter:brightness(.85)}
.gallery-item:hover img{transform:scale(1.06);filter:brightness(1)}
.gallery-item__label{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);font-size:12px;color:var(--text);letter-spacing:1px;opacity:0;transition:opacity .3s}
.gallery-item:hover .gallery-item__label{opacity:1}
/* Lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9999;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:90vh;object-fit:contain}
.lb__close{position:absolute;top:24px;right:32px;color:var(--gold);font-size:32px;cursor:pointer;background:none;border:none;line-height:1}
/* Pricing */
.pricing-sec{padding:100px 0}
.pricing-sec__title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,44px);font-weight:900;margin-bottom:12px}
.pricing-sec__desc{font-size:15px;color:var(--text-dim);line-height:1.8;font-weight:300;margin-bottom:40px}
.ptabs{display:flex;margin-bottom:28px;border:1px solid var(--glass-border);width:fit-content;flex-wrap:wrap}
.ptab{padding:12px 32px;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:var(--t)}
.ptab.active{background:var(--gold);color:var(--black)}
.ptab-content{display:none}.ptab-content.show{display:block}
.ptable-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.ptable{width:100%;border-collapse:collapse;min-width:480px}
.ptable th{background:var(--black3);color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:14px 16px;border:1px solid var(--glass-border);text-align:center;font-weight:700}
.ptable th.lh{text-align:left}
.ptable td{padding:12px 16px;border:1px solid var(--glass-border);font-size:14px;color:var(--text-dim);text-align:center}
.ptable td.rh{text-align:left;font-weight:700;color:var(--text);background:var(--black2);white-space:nowrap}
.ptable tr:hover td{background:rgba(201,169,110,.02)}
.ptable .total td{background:var(--black3)}
.ptable .total .rh{color:var(--gold)}
.ptable .total td:not(.rh){color:var(--gold);font-weight:700;font-size:15px}
.price-notice{margin-top:18px;padding:16px 20px;border:1px solid var(--glass-border);background:var(--black2);font-size:13px;color:var(--text-muted);line-height:1.8}
/* Features */
.features-sec{padding:80px 0;border-top:1px solid var(--glass-border)}
.features-sec__title{font-family:'Playfair Display',serif;font-size:clamp(24px,3vw,36px);font-weight:900;margin-bottom:8px}
.features-sec__desc{font-size:15px;color:var(--text-dim);font-weight:300;margin-bottom:36px}
.features-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.feat-item{padding:28px;border:1px solid var(--glass-border);display:flex;gap:16px;align-items:flex-start;transition:var(--t)}
.feat-item:hover{border-color:var(--gold);background:rgba(201,169,110,.02)}
.feat-item__icon{font-size:24px;flex-shrink:0;margin-top:2px}
.feat-item__text{font-size:14px;color:var(--text-dim);line-height:1.7}
/* FAQ */
.faq-sec{padding:80px 0;border-top:1px solid var(--glass-border)}
.faq-sec__title{font-family:'Playfair Display',serif;font-size:clamp(24px,3vw,36px);font-weight:900;margin-bottom:32px}
.faq-item{border-bottom:1px solid var(--glass-border)}
.faq-q{width:100%;background:none;border:none;text-align:left;padding:20px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;font-family:'Noto Sans KR',sans-serif}
.faq-q-text{font-size:15px;font-weight:700;color:var(--text);line-height:1.5}
.faq-icon{color:var(--gold);font-size:22px;flex-shrink:0;transition:transform .3s;font-weight:300}
.faq-item.open .faq-icon{transform:rotate(45deg)}
.faq-a{display:none;padding:4px 0 20px;font-size:14px;color:var(--text-dim);line-height:1.85}
.faq-item.open .faq-a{display:block}
/* CTA */
.cta-sec{padding:80px 0;background:var(--black2);border-top:1px solid var(--glass-border)}
.cta-sec__inner{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.cta-sec__title{font-family:'Playfair Display',serif;font-size:clamp(26px,3.5vw,40px);font-weight:900;margin-bottom:14px}
.cta-sec__desc{font-size:15px;color:var(--text-dim);line-height:1.9;font-weight:300;margin-bottom:28px}
.cta-sec__btns{display:flex;gap:12px;flex-wrap:wrap}
/* Others */
.others-sec{padding:80px 0;border-top:1px solid var(--glass-border)}
.others-sec__title{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,34px);font-weight:900;margin-bottom:32px}
.others-grid{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}.others-grid::-webkit-scrollbar{display:none}
.ocard{flex:0 0 160px;border:1px solid var(--glass-border);transition:var(--t);display:block}
.ocard:hover{border-color:var(--gold);transform:translateY(-4px)}
.ocard__img{aspect-ratio:3/4;overflow:hidden;background:var(--black3)}
.ocard__img img{width:100%;height:100%;object-fit:cover;filter:grayscale(40%);transition:all .5s}
.ocard:hover .ocard__img img{filter:grayscale(0%);transform:scale(1.05)}
.ocard__body{padding:12px}
.ocard__name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:4px}
.ocard__desc{font-size:11px;color:var(--text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Footer */
.footer{border-top:1px solid var(--glass-border);padding:60px 0}
.footer__inner{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:40px}
.footer__logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--gold);letter-spacing:3px;margin-bottom:14px}
.footer__notice{font-size:12px;color:var(--text-muted);max-width:400px;line-height:1.8}
.footer__links{display:flex;gap:24px;flex-wrap:wrap}
.footer__links a{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}.footer__links a:hover{color:var(--gold)}
.footer__bottom{margin-top:40px;padding-top:20px;border-top:1px solid var(--glass-border);text-align:center;font-size:11px;color:var(--text-muted);letter-spacing:2px}
/* BTT */
.btt{position:fixed;bottom:32px;right:32px;width:46px;height:46px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;opacity:0;visibility:hidden;transition:var(--t);display:flex;align-items:center;justify-content:center;z-index:998;font-size:18px}
.btt.visible{opacity:1;visibility:visible}.btt:hover{background:var(--gold);color:var(--black)}
/* Responsive */
@media(max-width:1024px){
  .cta-sec__inner{grid-template-columns:1fr;gap:40px}
  .features-grid{grid-template-columns:repeat(2,1fr)}
  .gallery-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .nav{display:none}.mobile-toggle{display:block}
  .header{padding:14px 0}.logo{font-size:20px}.container{padding:0 16px}
  .dhero{min-height:75vh}
  .dhero__title{font-size:clamp(38px,11vw,64px)}
  .dhero__meta{gap:8px}
  .dhero__meta-tag{font-size:11px;padding:6px 12px}
  .contact-bar__inner{flex-direction:column;align-items:flex-start}
  .contact-bar__btns{width:100%}.btn-call,.btn-call-out{flex:1;text-align:center;padding:12px 16px}
  .pricing-sec{padding:60px 0}.features-sec,.cta-sec,.others-sec,.faq-sec,.gallery-sec{padding:60px 0}
  .ptab{padding:10px 16px;font-size:11px;letter-spacing:2px}
  .features-grid{grid-template-columns:1fr}
  .feat-item{padding:20px}
  .cta-sec__btns{flex-direction:column}
  .btn-call,.btn-call-out{text-align:center}
  .ocard{flex:0 0 140px}
  .footer{padding:40px 0}
  .footer__inner{flex-direction:column;gap:24px}
  .btt{width:40px;height:40px;bottom:20px;right:16px;font-size:16px}
  .gallery-grid{grid-template-columns:repeat(2,1fr)}
  .summary-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .dhero__title{font-size:clamp(34px,11vw,52px)}
  .dhero__desc{font-size:14px}
  .contact-bar__info{gap:16px}
  .ptable{min-width:420px}
  .gallery-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="../../index.html" class="logo">CHOICE LOUNGE</a>
    <nav class="nav">
      <a href="../../highperpublic/index.html" class="active">하이퍼블릭</a>
      <a href="#" class="nav__cta" id="nav-cta">Reserve</a>
      <button class="lang-btn" id="langBtn">EN</button>
    </nav>
    <button class="mobile-toggle" id="mobileOpen">MENU</button>
  </div>
</header>

<nav class="mobile-nav" id="mobileNav">
  <button class="mobile-nav__close" id="mobileClose">✕</button>
  <a href="../../highperpublic/index.html">하이퍼블릭</a>
  <button class="lang-btn" id="mobileLangBtn" style="margin-top:8px">EN</button>
  <a href="#" id="mobile-cta" style="color:var(--gold);border:1px solid var(--gold);padding:14px 40px;margin-top:8px">Reserve</a>
</nav>

<!-- Hero -->
<section class="dhero" id="dhero">
  <div class="dhero__bg">
    <img id="hero-img" alt="" style="display:none">
    <div class="dhero__ov"></div>
  </div>
  <div class="container">
    <div class="dhero__content">
      <div class="dhero__breadcrumb">
        <a href="../../index.html">HOME</a> ·
        <a href="../../highperpublic/index.html">하이퍼블릭</a>
        · <span id="bc-name"></span>
      </div>
      <div class="dhero__badge"><span class="dhero__badge-dot"></span><span id="hero-badge"></span></div>
      <h1 class="dhero__title"><em id="hero-name"></em></h1>
      <p class="dhero__desc" id="hero-desc"></p>
      <div class="dhero__meta" id="hero-meta"></div>
    </div>
  </div>
</section>

<!-- 예약문의 바 -->
<div class="contact-bar">
  <div class="container">
    <div class="contact-bar__inner">
      <div class="contact-bar__info" id="contact-info"></div>
      <div class="contact-bar__btns" id="contact-btns"></div>
    </div>
  </div>
</div>

<!-- 전화 연결 -->
<div class="social-bar">
  <div class="container">
    <div class="social-bar__inner" id="social-links"></div>
  </div>
</div>

<!-- 핵심 정보 -->
<section class="summary-sec" id="summary-sec" style="display:none">
  <div class="container">
    <span class="eyebrow reveal">Quick Info</span>
    <h2 class="summary-sec__title reveal" id="summary-title"></h2>
    <div class="summary-grid" id="summary-grid"></div>
  </div>
</section>

<!-- 콘텐츠 섹션 -->
<div id="content-sections"></div>

<!-- 갤러리 -->
<section class="gallery-sec" id="gallery-sec" style="display:none">
  <div class="container">
    <span class="eyebrow reveal">Gallery</span>
    <h2 class="gallery-sec__title reveal" id="gallery-title"></h2>
    <p class="gallery-sec__desc reveal" id="gallery-desc"></p>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</section>

<!-- 라이트박스 -->
<div class="lb" id="lightbox">
  <button class="lb__close" id="lb-close">✕</button>
  <img src="" alt="" id="lb-img">
</div>

<!-- 가격 안내 -->
<section class="pricing-sec">
  <div class="container">
    <div class="reveal">
      <span class="eyebrow">Pricing</span>
      <h2 class="pricing-sec__title" id="price-title"></h2>
      <p class="pricing-sec__desc" id="price-desc"></p>
      <div class="ptabs" id="ptabs"></div>
      <div id="ptab-contents"></div>
      <div class="price-notice" id="price-notice" style="display:none"></div>
    </div>
  </div>
</section>

<!-- 특징 -->
<section class="features-sec">
  <div class="container">
    <span class="eyebrow reveal">Features</span>
    <h2 class="features-sec__title reveal" id="feat-title"></h2>
    <p class="features-sec__desc reveal" id="feat-desc"></p>
    <div class="features-grid" id="features-grid"></div>
  </div>
</section>

<!-- FAQ -->
<section class="faq-sec" id="faq-sec" style="display:none">
  <div class="container">
    <span class="eyebrow reveal">FAQ</span>
    <h2 class="faq-sec__title reveal" id="faq-title"></h2>
    <div id="faq-list"></div>
  </div>
</section>

<!-- 예약 CTA -->
<section class="cta-sec">
  <div class="container">
    <div class="cta-sec__inner">
      <div class="reveal">
        <span class="eyebrow">예약문의</span>
        <h2 class="cta-sec__title" id="cta-title"></h2>
        <p class="cta-sec__desc" id="cta-desc"></p>
      </div>
      <div class="reveal">
        <div class="cta-sec__btns" id="cta-btns"></div>
      </div>
    </div>
  </div>
</section>

<!-- 다른 업소 -->
<section class="others-sec">
  <div class="container">
    <span class="eyebrow reveal">Other Venues</span>
    <h2 class="others-sec__title reveal">다른 하이퍼블릭</h2>
    <div class="others-grid" id="others-grid"></div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <div class="footer__inner">
      <div>
        <div class="footer__logo">CHOICE LOUNGE</div>
        <p class="footer__notice" id="footer-notice"></p>
      </div>
      <div class="footer__links">
        <a href="../../highperpublic/index.html">하이퍼블릭</a>
        <a href="../../sitemap.xml">Sitemap</a>
      </div>
    </div>
    <div class="footer__bottom" id="footer-copy"></div>
  </div>
</footer>

<button class="btt" id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>

var VENUE_SLUG = 'dalto';
var SLUG_DIR_MAP = {
  unmi:     '../unmi/',
  dessert:  '../dessert/',
  dalto:    '../dalto/',
  elite:    '../elite/',
  dopamine: '../dopamine/',
  zeus:     '../zeus/',
  sumokwon: '../drama/',
  worklife: '../worklife/'
};
var ROOT = '../../';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(n){return Number(n).toLocaleString('ko-KR')}
var isEn = localStorage.getItem('cl_lang')==='en';
function tl(ko,en){return isEn?en:ko}
function applyLang(){
  document.body.classList.toggle('lang-en',isEn);
  document.querySelectorAll('.lang-btn').forEach(function(b){b.textContent=isEn?'한':'EN'});
  document.documentElement.lang = isEn ? 'en' : 'ko-KR';
}
applyLang();

var heroBgImg = document.querySelector('.dhero__bg img');
var hdr = document.getElementById('header');
var bttEl = document.getElementById('btt');

function onScroll(){
  var sy = window.pageYOffset;
  var hh = document.getElementById('dhero').offsetHeight;
  hdr.classList.toggle('scrolled', sy>60);
  bttEl.classList.toggle('visible', sy>400);
  if(heroBgImg && sy < hh){
    heroBgImg.style.transform = 'translateY('+Math.round(sy*0.35)+'px)';
  }
}
window.addEventListener('scroll', onScroll, {passive:true});

var obs = new IntersectionObserver(function(es){
  es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('v')});
},{threshold:.1});
function observe(root){
  (root||document).querySelectorAll('.reveal').forEach(function(el){obs.observe(el)});
}
observe();

document.getElementById('mobileOpen').onclick = function(){document.getElementById('mobileNav').classList.add('open')};
document.getElementById('mobileClose').onclick = function(){document.getElementById('mobileNav').classList.remove('open')};
document.querySelectorAll('#mobileNav a').forEach(function(a){
  a.addEventListener('click',function(){document.getElementById('mobileNav').classList.remove('open')});
});

function toggleLang(){
  isEn = !isEn;
  localStorage.setItem('cl_lang', isEn?'en':'ko');
  applyLang();
  if(window._venueData) renderContent(window._venueData[0], window._venueData[1]);
}
document.getElementById('langBtn').addEventListener('click', toggleLang);
document.getElementById('mobileLangBtn').addEventListener('click', function(){
  document.getElementById('mobileNav').classList.remove('open');
  toggleLang();
});

/* Lightbox */
var lb = document.getElementById('lightbox');
document.getElementById('lb-close').onclick = function(){lb.classList.remove('open')};
lb.addEventListener('click', function(e){if(e.target===lb)lb.classList.remove('open')});
document.addEventListener('keydown', function(e){if(e.key==='Escape')lb.classList.remove('open')});
window.openLightbox = function(src, alt){
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-img').alt = alt||'';
  lb.classList.add('open');
};

/* Price table */
function renderPriceTable(part){
  var persons=[1,2,3,4];
  var da=persons.map(function(){return part.drink});
  var ta=persons.map(function(p){return part.tcPerPerson ? part.tc*p : part.tc});
  var ra=persons.map(function(){return part.rt});
  var totals=persons.map(function(p,i){return da[i]+ta[i]+ra[i]});
  var th='<tr><th class="lh">'+tl('구분','Category')+'</th>'+persons.map(function(p){return '<th>'+p+tl('인',' person')+'</th>'}).join('')+'</tr>';
  function row(label,vals){return '<tr><td class="rh">'+label+'</td>'+vals.map(function(v){return '<td>'+fmt(v)+tl('원','')+'</td>'}).join('')+'</tr>'}
  var tbody=row(tl('주대','Drinks'),da)
    +row(tl('TC (타임차지)','TC (Time Charge)'),ta)
    +row(tl('RT (웨이터팁)','RT (Waiter Tip)'),ra)
    +'<tr class="total"><td class="rh">'+tl('합계','Total')+'</td>'
    +totals.map(function(tt){return '<td>'+fmt(tt)+tl('원','')+'</td>'}).join('')+'</tr>';
  return '<div class="ptable-wrap"><table class="ptable"><thead>'+th+'</thead><tbody>'+tbody+'</tbody></table></div>';
}

/* FAQ toggle */
window.toggleFaq = function(idx){
  var item = document.getElementById('faq-'+idx);
  if(item) item.classList.toggle('open');
};

/* Main render */
function renderContent(venues, texts){
  var v = venues[VENUE_SLUG];
  if(!v){console.error('Venue not found:', VENUE_SLUG); return;}
  var phoneLink = v.phoneLink || '#';

  /* Page title / meta */
  var pageTitle = (v.meta&&v.meta.title) ? v.meta.title : (v.fullName||v.name)+' | CHOICE LOUNGE';
  var pageDesc  = (v.meta&&v.meta.desc)  ? v.meta.desc  : v.desc;
  document.title = isEn ? (v.nameEn||v.name)+' - Gangnam Hyper Public | CHOICE LOUNGE' : pageTitle;
  document.getElementById('page-desc').setAttribute('content', isEn?(v.descEn||v.desc):pageDesc);
  document.getElementById('nav-cta').href = phoneLink;
  document.getElementById('mobile-cta').href = phoneLink;

  /* Hero */
  document.getElementById('bc-name').textContent = v.fullName||v.name;
  document.getElementById('hero-name').textContent = v.fullName||v.name;
  document.getElementById('hero-desc').textContent = isEn ? (v.descEn||v.desc) : v.desc;
  document.getElementById('hero-badge').textContent = (v.status||'영업중')+' · Hyper Public';

  var heroGal = (v.gallery||[]).filter(function(g){return g.section==='hero'&&g.src});
  if(!heroGal.length) heroGal = (v.gallery||[]).filter(function(g){return g.src});
  if(heroGal.length){
    var hi = document.getElementById('hero-img');
    hi.style.display = '';
    hi.alt = heroGal[0].alt||'';
    hi.onerror = function(){this.style.display='none'};
    hi.src = ROOT+heroGal[0].src;
  }

  /* Hero meta tags from summaryBullets */
  var mt = '';
  if(v.summaryBullets&&v.summaryBullets.length){
    v.summaryBullets.slice(0,3).forEach(function(b){mt+='<span class="dhero__meta-tag">'+esc(b)+'</span>'});
  } else {
    if(v.rooms) mt+='<span class="dhero__meta-tag">룸 '+esc(v.rooms)+'개</span>';
    if(v.operation) mt+='<span class="dhero__meta-tag">'+esc(v.operation.hours||'')+'</span>';
  }
  document.getElementById('hero-meta').innerHTML = mt;

  /* Contact bar */
  var ci = '';
  if(v.address) ci+='<div><div class="contact-bar__label">주소</div><div class="contact-bar__value">'+esc(v.address)+'</div></div>';
  if(v.operation){
    ci+='<div><div class="contact-bar__label">운영</div><div class="contact-bar__value">'+esc(v.operation.hours||'')+'</div></div>';
    if(v.operation.pickupFree) ci+='<div><div class="contact-bar__label">픽업</div><div class="contact-bar__value gold">'+esc(v.operation.pickupText||'무료 픽업 가능')+'</div></div>';
  }
  document.getElementById('contact-info').innerHTML = ci;
  document.getElementById('contact-btns').innerHTML = '<a href="'+esc(phoneLink)+'" class="btn-call">전화문의</a>';

  /* Social bar */
  document.getElementById('social-links').innerHTML =
    '<a href="'+esc(phoneLink)+'" class="soc-btn soc-btn--phone">'
    +'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>'
    +'<span>전화문의</span></a>';

  /* Summary bullets */
  var ssec = document.getElementById('summary-sec');
  if(v.summaryBullets&&v.summaryBullets.length){
    ssec.style.display='';
    document.getElementById('summary-title').textContent=(v.fullName||v.name)+' 핵심 정보';
    document.getElementById('summary-grid').innerHTML=v.summaryBullets.map(function(b){
      return '<div class="summary-item reveal">'+esc(b)+'</div>';
    }).join('');
    observe(ssec);
  }

  /* Content sections */
  var secEl = document.getElementById('content-sections');
  var secHtml='';
  if(v.sections&&v.sections.length){
    v.sections.forEach(function(sec){
      if(!sec.title&&(!sec.body||!sec.body.length))return;
      secHtml+='<section class="content-sec"><div class="container">';
      if(sec.title) secHtml+='<h2 class="content-sec__title reveal">'+esc(sec.title)+'</h2>';
      if(sec.body&&sec.body.length){
        secHtml+='<div class="content-sec__body">';
        sec.body.forEach(function(p){if(p) secHtml+='<p class="reveal">'+esc(p)+'</p>'});
        secHtml+='</div>';
      }
      secHtml+='</div></section>';
    });
  }
  secEl.innerHTML=secHtml;
  observe(secEl);

  /* Gallery */
  var gsec = document.getElementById('gallery-sec');
  var galItems=(v.gallery||[]).filter(function(g){return g.src});
  if(galItems.length){
    gsec.style.display='';
    document.getElementById('gallery-title').textContent=(v.fullName||v.name)+' 갤러리';
    document.getElementById('gallery-desc').textContent='매장 내부 및 외부 사진을 확인하세요.';
    document.getElementById('gallery-grid').innerHTML=galItems.map(function(g){
      var src=ROOT+g.src;
      var alt=g.alt||g.label||'';
      return '<div class="gallery-item reveal" onclick="openLightbox(\''+src.replace(/'/g,"\\'")+'\')">'
        +'<img src="'+src+'" alt="'+esc(alt)+'" loading="lazy">'
        +'<div class="gallery-item__label">'+esc(g.label||'')+'</div>'
        +'</div>';
    }).join('');
    observe(gsec);
  }

  /* Pricing */
  document.getElementById('price-title').textContent=(v.fullName||v.name)+' 가격 안내';
  document.getElementById('price-desc').textContent=v.priceNote||'아래 금액은 평균 기준이며 실제 가격은 상황에 따라 달라질 수 있습니다.';
  var pnEl=document.getElementById('price-notice');
  if(v.notice){pnEl.style.display='';pnEl.innerHTML='<strong>※ 안내</strong> · '+esc(v.notice)}else{pnEl.style.display='none'}

  var tabsH='',contH='';
  [v.part0,v.part1,v.part2].filter(Boolean).forEach(function(part,i){
    var id='ptab-'+i,act=i===0?'active':'',show=i===0?'show':'';
    tabsH+='<div class="ptab '+act+'" data-id="'+id+'">'+esc(part.label)+' · '+esc(part.time)+'</div>';
    contH+='<div class="ptab-content '+show+'" id="'+id+'">'+renderPriceTable(part)+'</div>';
  });
  document.getElementById('ptabs').innerHTML=tabsH;
  document.getElementById('ptab-contents').innerHTML=contH;
  document.querySelectorAll('.ptab').forEach(function(tab){
    tab.addEventListener('click',function(){
      document.querySelectorAll('.ptab').forEach(function(tb){tb.classList.remove('active')});
      document.querySelectorAll('.ptab-content').forEach(function(ct){ct.classList.remove('show')});
      tab.classList.add('active');
      document.getElementById(tab.dataset.id).classList.add('show');
    });
  });

  /* Features */
  document.getElementById('feat-title').textContent=(v.fullName||v.name)+' 특징';
  document.getElementById('feat-desc').textContent=v.desc;
  if(v.features&&v.features.length){
    document.getElementById('features-grid').innerHTML=v.features.map(function(f){
      return '<div class="feat-item reveal"><div class="feat-item__icon">'+esc(f.icon||'')+'</div><div class="feat-item__text">'+esc(f.text)+'</div></div>';
    }).join('');
    observe(document.getElementById('features-grid'));
  }

  /* FAQ */
  var fsec=document.getElementById('faq-sec');
  if(v.faq&&v.faq.length){
    fsec.style.display='';
    document.getElementById('faq-title').textContent='자주 묻는 질문';
    document.getElementById('faq-list').innerHTML=v.faq.map(function(item,i){
      return '<div class="faq-item reveal" id="faq-'+i+'">'
        +'<button class="faq-q" onclick="toggleFaq('+i+')">'
        +'<span class="faq-q-text">'+esc(item.q)+'</span>'
        +'<span class="faq-icon">+</span>'
        +'</button>'
        +'<div class="faq-a">'+esc(item.a)+'</div>'
        +'</div>';
    }).join('');
    observe(fsec);
  }

  /* CTA */
  document.getElementById('cta-title').textContent='지금 바로 예약하세요';
  document.getElementById('cta-desc').textContent=v.desc;
  document.getElementById('cta-btns').innerHTML=
    '<a href="'+esc(phoneLink)+'" class="btn-call">전화문의</a>'
    +'<a href="'+ROOT+'highperpublic/index.html" class="btn-call-out">목록으로</a>';

  /* Others */
  var othH='';
  Object.keys(venues).forEach(function(sl){
    if(sl===VENUE_SLUG)return;
    var ov=venues[sl];
    var dir=SLUG_DIR_MAP[sl]||('../'+sl+'/');
    var firstImg=(ov.gallery||[]).find(function(g){return g.src});
    var imgH=firstImg?'<img src="'+ROOT+firstImg.src+'" alt="'+esc(ov.name)+'" loading="lazy">':'';
    othH+='<a href="'+dir+'" class="ocard">'
      +'<div class="ocard__img">'+imgH+'</div>'
      +'<div class="ocard__body"><div class="ocard__name">'+esc(ov.name)+'</div>'
      +'<div class="ocard__desc">'+esc(ov.desc)+'</div></div></a>';
  });
  document.getElementById('others-grid').innerHTML=othH;
  observe(document.getElementById('others-grid'));

  /* Footer */
  if(texts&&texts.footer){
    document.getElementById('footer-notice').textContent=texts.footer.notice||'';
    document.getElementById('footer-copy').textContent=texts.footer.copyright||'';
  }
}

Promise.all([
  fetch(ROOT+'venues.json').then(function(r){return r.json()}),
  fetch(ROOT+'texts.json').then(function(r){return r.json()})
]).then(function(res){
  window._venueData=res;
  renderContent(res[0],res[1]);
}).catch(function(e){console.error('Load error:',e)});

</script>
</body>
</html>
